<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="mg-silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f5f9"/>
      <stop offset="40%" stop-color="#b8c0cc"/>
      <stop offset="100%" stop-color="#5a626c"/>
    </linearGradient>
    <linearGradient id="mg-frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(200,210,220,0.55)"/>
      <stop offset="100%" stop-color="rgba(120,130,145,0.35)"/>
    </linearGradient>
    <linearGradient id="mg-glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8dde4"/>
      <stop offset="100%" stop-color="#8a929e"/>
    </linearGradient>
  </defs>
  <!-- Outer frame -->
  <rect x="2" y="2" width="92" height="92" fill="#030405" stroke="url(#mg-frame)" stroke-width="1"/>
  <!-- Roof: sharp M / gable -->
  <path d="M48 10 L86 46 H62 L48 32 L34 46 H10 Z" fill="url(#mg-silver)"/>
  <!-- Subtle roof highlight -->
  <path d="M48 10 L62 28 L48 22 L34 28 Z" fill="#ffffff" opacity="0.12"/>
  <!-- Tower / facade -->
  <rect x="22" y="46" width="52" height="40" fill="#07090c" stroke="url(#mg-frame)" stroke-width="1"/>
  <!-- Vertical rhythm: columns of light -->
  <rect x="28" y="52" width="12" height="10" fill="url(#mg-glass)" opacity="0.95"/>
  <rect x="42" y="52" width="12" height="10" fill="url(#mg-glass)" opacity="0.85"/>
  <rect x="56" y="52" width="12" height="10" fill="url(#mg-glass)" opacity="0.95"/>
  <rect x="28" y="66" width="12" height="10" fill="url(#mg-glass)" opacity="0.65"/>
  <rect x="42" y="66" width="12" height="10" fill="url(#mg-glass)" opacity="0.55"/>
  <rect x="56" y="66" width="12" height="10" fill="url(#mg-glass)" opacity="0.65"/>
  <!-- Entry -->
  <rect x="40" y="72" width="16" height="14" fill="none" stroke="url(#mg-silver)" stroke-width="1.5" opacity="0.9"/>
  <line x1="48" y1="72" x2="48" y2="86" stroke="url(#mg-silver)" stroke-width="1" opacity="0.5"/>
</svg>
